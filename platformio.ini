[platformio]
src_dir = src/firmware

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
test_framework = unity
test_build_src = yes
build_src_filter = +<*> -<main.cpp>
test_speed = 115200

lib_deps =
  pololu/VL53L0X @ ^1.3.1
  adafruit/Adafruit MPU6050 @ ^2.2.6
  adafruit/Adafruit Unified Sensor @ ^1.1.14